name: Secure Code Review

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ── Semgrep SAST ───────────────────────────────────────────────────────────
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep (OWASP Top 10)
        run: |
          semgrep \
            --config p/owasp-top-ten \
            --config p/python \
            --config p/javascript \
            --config p/java \
            --sarif \
            --output semgrep-results.sarif \
            --severity ERROR \
            --severity WARNING \
            .
        continue-on-error: true

      - name: Upload Semgrep SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Fail on critical findings
        run: |
          semgrep \
            --config p/owasp-top-ten \
            --severity ERROR \
            --error \
            .

  # ── Bandit (Python) ────────────────────────────────────────────────────────
  bandit:
    name: Bandit Python Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Python files
        id: check-python
        run: |
          if find . -name "*.py" -not -path "./.git/*" | grep -q .; then
            echo "has_python=true" >> $GITHUB_OUTPUT
          else
            echo "has_python=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.check-python.outputs.has_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        if: steps.check-python.outputs.has_python == 'true'
        run: pip install bandit[toml]

      - name: Run Bandit
        if: steps.check-python.outputs.has_python == 'true'
        run: |
          bandit -r . \
            -f json \
            -o bandit-report.json \
            -ll \
            --exclude ./.git,./tests/vulnerable_samples \
            || true

      - name: Parse Bandit results and fail on HIGH/CRITICAL
        if: steps.check-python.outputs.has_python == 'true'
        run: |
          python3 -c "
          import json, sys
          with open('bandit-report.json') as f:
              data = json.load(f)
          issues = data.get('results', [])
          critical = [i for i in issues if i.get('issue_severity') == 'HIGH' and i.get('issue_confidence') != 'LOW']
          if critical:
              print(f'Found {len(critical)} HIGH severity Bandit findings:')
              for i in critical[:10]:
                  print(f\"  [{i['test_id']}] {i['issue_text']} ({i.get('filename','?')}:{i.get('line_number','?')})\")
              sys.exit(1)
          else:
              print(f'Bandit: {len(issues)} findings, none HIGH+confidence')
          "

      - name: Upload Bandit report
        if: always() && steps.check-python.outputs.has_python == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  # ── Gitleaks Secret Detection ──────────────────────────────────────────────
  gitleaks:
    name: Gitleaks Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for secret detection

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── OWASP Dependency-Check ─────────────────────────────────────────────────
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: ${{ github.repository }}
          path: .
          format: JSON
          args: >
            --failOnCVSS 7
            --enableRetired
            --disableAssembly

      - name: Upload Dependency-Check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: reports/
          retention-days: 30

  # ── CodeQL Analysis ────────────────────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql-${{ matrix.language }}

  # ── Notify Code Review Framework ──────────────────────────────────────────
  notify-framework:
    name: Notify Code Review Framework
    runs-on: ubuntu-latest
    needs: [semgrep, bandit, gitleaks, dependency-check]
    if: always()
    steps:
      - name: Send scan results to framework
        run: |
          STATUS="completed"
          if [ "${{ needs.semgrep.result }}" == "failure" ] || \
             [ "${{ needs.bandit.result }}" == "failure" ] || \
             [ "${{ needs.gitleaks.result }}" == "failure" ]; then
            STATUS="failed"
          fi

          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CODE_REVIEW_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"ref\": \"${{ github.ref }}\",
              \"after\": \"${{ github.sha }}\",
              \"repository\": {\"clone_url\": \"${{ github.server_url }}/${{ github.repository }}.git\"},
              \"commits\": [],
              \"status\": \"$STATUS\",
              \"workflow_run_id\": \"${{ github.run_id }}\"
            }" \
            "${{ secrets.CODE_REVIEW_API_URL }}/scans/webhook/github" || true
