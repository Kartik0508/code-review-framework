rules:

  # ── A01: Broken Access Control ────────────────────────────────────────────

  - id: python-path-traversal-open
    languages: [python]
    severity: ERROR
    message: >
      Path traversal: user-controlled input flows into open(). An attacker could read
      arbitrary files from the filesystem. Validate the resolved path against an allowed base directory.
    patterns:
      - pattern: open($X + ...)
      - pattern-not: open("...")
    metadata:
      cwe: ["CWE-22"]
      owasp: ["A01:2021 - Broken Access Control"]
      references: ["https://owasp.org/Top10/A01_2021-Broken_Access_Control/"]

  - id: python-path-traversal-os-join
    languages: [python]
    severity: ERROR
    message: >
      Potential path traversal via os.path.join with user-controlled input.
      Use os.path.realpath() and verify the result is within the expected base directory.
    patterns:
      - pattern: os.path.join(..., request.$FIELD, ...)
    metadata:
      cwe: ["CWE-22"]
      owasp: ["A01:2021 - Broken Access Control"]
      references: ["https://owasp.org/Top10/A01_2021-Broken_Access_Control/"]

  # ── A02: Cryptographic Failures ───────────────────────────────────────────

  - id: python-hardcoded-secret-assignment
    languages: [python]
    severity: ERROR
    message: >
      Hardcoded secret detected. Credentials or secrets must not be stored in source code.
      Use environment variables or a secrets manager instead.
    patterns:
      - pattern: $VAR = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|passwd|secret|api_key|apikey|token|private_key|access_key)
      - pattern-not: $VAR = ""
    metadata:
      cwe: ["CWE-259", "CWE-798"]
      owasp: ["A02:2021 - Cryptographic Failures", "A07:2021 - Identification and Authentication Failures"]
      references: ["https://cwe.mitre.org/data/definitions/259.html"]

  - id: python-weak-hash-password
    languages: [python]
    severity: ERROR
    message: >
      MD5 or SHA1 is insecure for password hashing. Use bcrypt, scrypt, or Argon2.
    pattern-either:
      - pattern: hashlib.md5(...)
      - pattern: hashlib.sha1(...)
      - pattern: md5(...)
    metadata:
      cwe: ["CWE-327", "CWE-328"]
      owasp: ["A02:2021 - Cryptographic Failures"]
      references: ["https://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html"]

  # ── A03: Injection ────────────────────────────────────────────────────────

  - id: python-sql-injection-format
    languages: [python]
    severity: ERROR
    message: >
      SQL injection: string formatting used to build a SQL query. Use parameterized queries.
    pattern-either:
      - pattern: $CUR.execute("..." % ...)
      - pattern: $CUR.execute("..." + ...)
      - pattern: $CUR.execute(f"...")
    metadata:
      cwe: ["CWE-89"]
      owasp: ["A03:2021 - Injection"]
      references: ["https://owasp.org/Top10/A03_2021-Injection/"]

  - id: python-command-injection-os-system
    languages: [python]
    severity: ERROR
    message: >
      Command injection: os.system() with string concatenation or format.
      Use subprocess with a list of arguments and avoid shell=True.
    pattern-either:
      - pattern: os.system("..." + ...)
      - pattern: os.system(f"...")
      - pattern: os.system("..." % ...)
    metadata:
      cwe: ["CWE-78"]
      owasp: ["A03:2021 - Injection"]
      references: ["https://owasp.org/Top10/A03_2021-Injection/"]

  - id: python-command-injection-subprocess-shell
    languages: [python]
    severity: WARNING
    message: >
      subprocess called with shell=True and a string argument. Pass a list of arguments instead.
    patterns:
      - pattern: subprocess.$FUNC(..., shell=True, ...)
      - pattern-not: subprocess.$FUNC([...], shell=True, ...)
    metadata:
      cwe: ["CWE-78"]
      owasp: ["A03:2021 - Injection"]
      references: ["https://docs.python.org/3/library/subprocess.html#security-considerations"]

  - id: python-jinja2-autoescape-disabled
    languages: [python]
    severity: ERROR
    message: >
      Jinja2 autoescape is disabled, enabling XSS. Set autoescape=True when rendering user content.
    pattern: jinja2.Environment(..., autoescape=False, ...)
    metadata:
      cwe: ["CWE-79"]
      owasp: ["A03:2021 - Injection"]
      references: ["https://jinja.palletsprojects.com/en/3.1.x/api/#autoescaping"]

  # ── A07: Authentication Failures ─────────────────────────────────────────

  - id: python-insecure-deserialization-pickle
    languages: [python]
    severity: ERROR
    message: >
      Insecure deserialization: pickle.loads() on untrusted data allows arbitrary code execution.
      Use JSON or validate a cryptographic signature before deserializing.
    pattern-either:
      - pattern: pickle.loads(...)
      - pattern: pickle.load(...)
    metadata:
      cwe: ["CWE-502"]
      owasp: ["A08:2021 - Software and Data Integrity Failures"]
      references: ["https://owasp.org/Top10/A08_2021-Software_and_Data_Integrity_Failures/"]

  # ── A05: Security Misconfiguration ────────────────────────────────────────

  - id: python-flask-debug-mode
    languages: [python]
    severity: WARNING
    message: >
      Flask debug mode is enabled. This exposes an interactive debugger in production.
      Set debug=False and use FLASK_ENV=production.
    pattern-either:
      - pattern: app.run(..., debug=True, ...)
      - pattern: app.run(debug=True)
    metadata:
      cwe: ["CWE-94"]
      owasp: ["A05:2021 - Security Misconfiguration"]
      references: ["https://flask.palletsprojects.com/en/2.3.x/debugging/"]

  # ── A09: Logging Failures ────────────────────────────────────────────────

  - id: python-logging-sensitive-data
    languages: [python]
    severity: WARNING
    message: >
      Potential logging of sensitive data. Do not log passwords, tokens, or secrets.
    patterns:
      - pattern: logging.$LEVEL(..., $VAR, ...)
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|passwd|secret|api_key|token|credential)
    metadata:
      cwe: ["CWE-532"]
      owasp: ["A09:2021 - Security Logging and Monitoring Failures"]
      references: ["https://owasp.org/Top10/A09_2021-Security_Logging_and_Monitoring_Failures/"]

  # ── A10: SSRF ────────────────────────────────────────────────────────────

  - id: python-ssrf-requests
    languages: [python]
    severity: ERROR
    message: >
      Server-Side Request Forgery (SSRF): requests.get/post with user-controlled URL.
      Validate and whitelist allowed hosts. Block internal IP ranges.
    pattern-either:
      - pattern: requests.get(request.$FIELD, ...)
      - pattern: requests.post(request.$FIELD, ...)
      - pattern: httpx.get(request.$FIELD, ...)
    metadata:
      cwe: ["CWE-918"]
      owasp: ["A10:2021 - Server-Side Request Forgery"]
      references: ["https://owasp.org/Top10/A10_2021-Server-Side_Request_Forgery_%28SSRF%29/"]
