apiVersion: 1

providers:
  - name: 'Code Review Dashboards'
    orgId: 1
    folder: 'Security'
    folderUid: 'security-folder'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
